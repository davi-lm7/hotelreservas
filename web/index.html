<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <title>Hotel Reservas</title>
  <link rel="stylesheet" href="stye.css">
</head>

<body>

  <aside class="barra-lateral">
    <div class="logo-barra-lateral">
      <img src="assets/hotel.png" class="imagem-logo" alt="Hotel Logo">
      <div>Hotel<br>Reservas</div>
    </div>
    <nav>
      <a href="index.html" class="ativo">☰ Quartos</a>
      <a href="reservas.html">📅 Reservas</a>
      <a href="#">ℹ️ Sobre</a>
    </nav>
  </aside>

  <div class="conteudo">
    <div class="cabecalho-pagina">
      <div>
        <h1>Quartos Cadastrados</h1>
        <p>Gerencie os quartos do hotel</p>
      </div>
      <button class="botao botao-primario" onclick="location.href='quartos.html'">+ Novo Quarto</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>Nº Quarto</th>
          <th>Tipo</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="lista-quartos">
        <tr>
          <td colspan="3">Carregando...</td>
        </tr>
      </tbody>
    </table>

    <footer>© 2024 Hotel Reservas - Projeto Full Stack</footer>
  </div>

  <div class="fundo-modal" id="modal-excluir-quarto">
    <div class="caixa-modal">
      <div class="icone-modal">⚠️</div>
      <h3>Excluir Quarto</h3>
      <p id="modal-quarto-texto">Deseja realmente excluir este quarto?</p>
      <div class="acoes-modal">
        <button class="botao botao-cancelar" onclick="fecharModal('modal-excluir-quarto')">Cancelar</button>
        <button class="botao botao-perigo" id="btn-confirmar-excluir">Excluir</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>

</html>
